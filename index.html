<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Epüyen Salud — Acompañamiento en salud mental</title>
<meta name="description" content="Acompañamiento en salud mental, orientación y bienestar. 100% online, en español, estés donde estés.">
<meta name="theme-color" content="#FAF6F0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Dancing+Script:wght@500;600;700&family=Hanken+Grotesk:wght@400;500;600;700;800&family=Newsreader:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="assets/isotipo.png">
<style>
  *{box-sizing:border-box;}
  body{margin:0;background:#F3ECE1;font-family:'Hanken Grotesk',system-ui,sans-serif;color:#3F4A4F;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
  ::selection{background:#F3A28F;color:#fff;}
  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
  @keyframes floaty2{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-7px) rotate(-4deg)}}
  /* subtle moving background gradients */
  @keyframes drift1{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(-30px,28px) scale(1.12);}}
  @keyframes drift2{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(34px,-22px) scale(1.14);}}
  @keyframes gradShift{0%,100%{background-position:0% 50%;}50%{background-position:100% 50%;}}
  .amb-a{animation:drift1 22s ease-in-out infinite;}
  .amb-b{animation:drift2 27s ease-in-out infinite;}
  .closing{background-size:200% 200% !important;animation:gradShift 20s ease-in-out infinite;}
  @media (prefers-reduced-motion: reduce){ *{animation:none !important;} }
  [hidden]{display:none !important;}
  html,body{overflow-x:hidden;}
  img{max-width:100%;}
  .nav{position:relative;z-index:40;}
  /* prevent grid blowout: let hero columns shrink below content min-content */
  .hero > div{min-width:0;}
  .eyebrow{flex-wrap:wrap;}
  .eyebrow > span{min-width:0;}

  /* burger + mobile menu */
  .burger{display:none;align-items:center;justify-content:center;width:44px;height:44px;border-radius:12px;border:1.5px solid rgba(96,121,133,.28);background:#fff;cursor:pointer;color:#607985;padding:0;}
  .mobile-menu{display:flex;flex-direction:column;gap:4px;background:#fff;border:1px solid rgba(96,121,133,.12);border-radius:16px;padding:10px;margin:6px 0 14px;box-shadow:0 20px 44px -22px rgba(96,121,133,.5);}
  .mobile-menu .mm-link{padding:12px 14px;border-radius:10px;color:#5b6a70;font-weight:600;font-size:15.5px;text-decoration:none;cursor:pointer;}
  .mobile-menu .mm-link:active{background:#F5EFE6;}
  .mobile-menu .mm-cta{margin-top:6px;text-align:center;background:#E97878;color:#fff;font-weight:700;font-size:15.5px;padding:14px;border-radius:12px;text-decoration:none;box-shadow:0 4px 0 #cf6262;cursor:pointer;}
  @media (min-width:721px){ .mobile-menu{display:none !important;} }

  /* "Trabajá con nosotros" modal + form */
  .modal{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
  .modal-backdrop{position:absolute;inset:0;background:rgba(45,55,60,.55);}
  .modal-card{position:relative;background:#FAF6F0;border-radius:24px;max-width:580px;width:100%;max-height:90vh;overflow-y:auto;padding:34px 32px;box-shadow:0 40px 80px -30px rgba(0,0,0,.5);}
  .modal-x{position:absolute;top:16px;right:18px;width:36px;height:36px;border:0;background:#fff;border-radius:50%;font-size:22px;line-height:1;color:#607985;cursor:pointer;box-shadow:0 4px 12px -6px rgba(0,0,0,.3);}
  .join-form{display:grid;gap:14px;margin-top:20px;}
  .join-form label{display:flex;flex-direction:column;gap:6px;font-size:13.5px;font-weight:600;color:#5b696f;}
  .join-form input,.join-form select,.join-form textarea{border:1.5px solid rgba(96,121,133,.18);border-radius:12px;padding:12px 14px;font-size:15px;font-family:inherit;color:#3F4A4F;background:#fff;outline:none;}
  .join-form input:focus,.join-form select:focus,.join-form textarea:focus{border-color:#E97878;}
  .join-form textarea{resize:vertical;min-height:72px;}
  .join-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .join-submit{display:inline-flex;align-items:center;justify-content:center;gap:9px;background:#E97878;color:#fff;font-weight:700;font-size:16px;padding:15px;border:0;border-radius:13px;box-shadow:0 5px 0 #cf6262;cursor:pointer;margin-top:4px;font-family:inherit;}
  @media (max-width:560px){ .join-row{grid-template-columns:1fr;} .modal-card{padding:26px 20px;} }
  @media (max-width:860px){ .join-grid{grid-template-columns:1fr !important;} .join-aside{display:none !important;} }

  /* ====================== RESPONSIVE ====================== */
  /* Tablet / small laptop ( <= 980px ) */
  @media (max-width:980px){
    .wrap{padding:0 24px !important;}
    .hero{grid-template-columns:1fr !important;gap:18px !important;padding:18px 0 16px !important;}
    .hero .hero-visual{max-width:270px;margin:4px auto 0;width:100%;}
    .hero-frame{height:250px !important;}
    .h1{font-size:clamp(38px,7vw,56px) !important;}
    .closing-grid{grid-template-columns:1fr !important;gap:30px !important;}
    .steps{grid-template-columns:1fr !important;}
  }

  /* Large phone / small tablet ( <= 720px ) */
  @media (max-width:720px){
    .nav{gap:12px;padding:20px 0 10px !important;}
    .nav-links{display:none !important;}
    .nav-cta{display:none !important;}
    .burger{display:inline-flex;}
    .cards{grid-template-columns:1fr 1fr !important;}
    .soon{grid-template-columns:1fr !important;}
    .closing{padding:38px 26px !important;}
    .deco-chat{top:-2px !important;left:-4px !important;width:74px !important;}
    .deco-check{bottom:-4px !important;right:-4px !important;width:86px !important;}
  }

  /* Phone ( <= 520px ) */
  @media (max-width:520px){
    .wrap{padding:0 16px !important;}
    .cards{grid-template-columns:1fr !important;}
    .stat-grid{grid-template-columns:1fr !important;gap:24px !important;}
    .stat-grid > div{border:0 !important;}
    .stat-banner{padding:34px 24px !important;}
    .h1{font-size:clamp(26px,7.4vw,40px) !important;overflow-wrap:break-word;}
    .foot{flex-direction:column;gap:24px !important;}
    .closing-cards span{font-size:30px !important;white-space:normal !important;}
    .hero-deco{width:104px !important;}
  }
</style>
</head>
<body>
<main>
<div data-screen-label="Home v2" data-lang-root="" style="position:relative;min-height:100vh;background:#FAF6F0;overflow:hidden;padding-bottom:4px;">

  <!-- ambient decor -->
  <div class="amb-a" aria-hidden="true" style="position:absolute;top:-160px;right:-120px;width:460px;height:460px;border-radius:50%;background:radial-gradient(circle,#F3A28F 0%,rgba(243,162,143,0) 68%);opacity:.4;pointer-events:none;"></div>
  <div class="amb-b" aria-hidden="true" style="position:absolute;top:520px;left:-140px;width:420px;height:420px;border-radius:50%;background:radial-gradient(circle,#BFE5E3 0%,rgba(191,229,227,0) 68%);opacity:.5;pointer-events:none;"></div>

  <div class="wrap" style="position:relative;max-width:1180px;margin:0 auto;padding:0 34px;z-index:2;">

    <!-- ============ NAV ============ -->
    <header class="nav" style="display:flex;align-items:center;justify-content:space-between;padding:26px 0 14px;">
      <img src="assets/logo.png" alt="epuyen salud" style="height:48px;width:auto;display:block;">
      <nav class="nav-links" style="display:flex;gap:30px;font-size:15px;color:#5b6a70;font-weight:500;">
        <span><span data-i18n="nav1"></span></span><span><span data-i18n="nav2"></span></span><span><span data-i18n="nav3"></span></span><span><span data-i18n="nav4"></span></span>
      </nav>
      <div style="display:flex;align-items:center;gap:14px;">
        <div data-lang-root="" style="position:relative;">
          <button onclick="toggleLang(event)" style="display:inline-flex;align-items:center;gap:7px;color:#607985;font-size:13.5px;font-weight:600;border:1.5px solid rgba(96,121,133,.28);border-radius:999px;padding:8px 13px;background:#fff;cursor:pointer;font-family:inherit;">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="9"></circle><path d="M3 12h18M12 3c2.6 2.8 2.6 15.2 0 18M12 3c-2.6 2.8-2.6 15.2 0 18"></path></svg>
            <span id="langName">ES</span>
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"></path></svg>
          </button>
          <div id="langMenu" hidden>
            <div style="position:absolute;top:48px;right:0;background:#fff;border:1px solid rgba(96,121,133,.14);border-radius:14px;padding:6px;box-shadow:0 20px 44px -22px rgba(96,121,133,.8);min-width:152px;z-index:60;">
              <button onclick="pickLang('es')" style="display:flex;width:100%;align-items:center;gap:9px;padding:9px 12px;border:0;background:none;border-radius:9px;cursor:pointer;font-family:inherit;font-size:14px;color:#607985;font-weight:500;text-align:left;">🇦🇷 Español</button>
              <button onclick="pickLang('en')" style="display:flex;width:100%;align-items:center;gap:9px;padding:9px 12px;border:0;background:none;border-radius:9px;cursor:pointer;font-family:inherit;font-size:14px;color:#607985;font-weight:500;text-align:left;">🇬🇧 English</button>
              <button onclick="pickLang('pt')" style="display:flex;width:100%;align-items:center;gap:9px;padding:9px 12px;border:0;background:none;border-radius:9px;cursor:pointer;font-family:inherit;font-size:14px;color:#607985;font-weight:500;text-align:left;">🇧🇷 Português</button>
            </div>
          </div>
        </div>
        <a class="nav-cta" style="display:inline-flex;align-items:center;gap:8px;background:#E97878;color:#fff;font-weight:700;font-size:14.5px;padding:12px 22px;border-radius:999px;text-decoration:none;box-shadow:0 5px 0 #cf6262,0 16px 26px -12px rgba(233,120,120,.85);cursor:pointer;white-space:nowrap;"><span data-i18n="empezar"></span>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"></path></svg></a>
        <button class="burger" aria-label="Menú" onclick="toggleMenu(event)">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"></path></svg>
        </button>
      </div>
    </header>

    <!-- mobile menu -->
    <div id="mobileMenu" class="mobile-menu" hidden>
      <a class="mm-link" data-i18n="nav1" onclick="closeMenu()"></a>
      <a class="mm-link" data-i18n="nav2" onclick="closeMenu()"></a>
      <a class="mm-link" data-i18n="nav3" onclick="closeMenu()"></a>
      <a class="mm-link" data-i18n="nav4" onclick="closeMenu()"></a>
      <a class="mm-cta" data-i18n="empezar" onclick="closeMenu()"></a>
    </div>

    <!-- ============ HERO ============ -->
    <section class="hero" style="position:relative;display:grid;grid-template-columns:1.05fr .95fr;gap:50px;align-items:center;padding:38px 0 30px;">

      <div style="position:relative;">
        <div style="display:flex;align-items:center;gap:11px;flex-wrap:wrap;">
          <span class="eyebrow" style="display:inline-flex;align-items:center;gap:8px;color:#E97878;font-size:12.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;">
            <span style="width:7px;height:7px;border-radius:50%;background:#E97878;"></span><span data-i18n="eyebrow"></span>
          </span>
          <span style="display:inline-flex;align-items:center;gap:7px;background:#EAF6F4;color:#4f928d;font-size:12.5px;font-weight:700;border-radius:999px;padding:6px 12px;white-space:nowrap;">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2.5" y="6.5" width="13" height="11" rx="2.5"></rect><path d="M15.5 10l5-2.5v9l-5-2.5z"></path></svg><span data-i18n="vbadge"></span>
          </span>
        </div>

        <h1 class="h1" style="font-family:'Newsreader',serif;font-weight:500;font-size:60px;line-height:1.04;color:#4a5b62;letter-spacing:-.015em;margin:22px 0 0;"><span data-i18n="h1a"></span><span style="font-family:'Dancing Script',cursive;font-weight:600;color:#E97878;font-size:1.18em;text-decoration:underline wavy #F3A28F;text-decoration-thickness:2.5px;text-underline-offset:7px;padding:0 .08em;"><span data-i18n="h1em"></span></span><span data-i18n="h1b"></span></h1>

        <p style="font-size:18.5px;line-height:1.62;color:#5b696f;max-width:30em;margin:24px 0 0;"><span data-i18n="sub"></span></p>

        <div style="display:flex;gap:15px;margin-top:34px;flex-wrap:wrap;align-items:center;">
          <a style="display:inline-flex;align-items:center;gap:10px;background:#E97878;color:#fff;font-weight:700;font-size:16px;padding:16px 28px;border-radius:999px;text-decoration:none;box-shadow:0 5px 0 #cf6262,0 18px 30px -14px rgba(233,120,120,.9);cursor:pointer;"><span data-i18n="cta1"></span>
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"></path></svg></a>
          <a style="display:inline-flex;align-items:center;gap:9px;background:#fff;color:#607985;font-weight:700;font-size:16px;padding:15px 24px;border-radius:999px;text-decoration:none;border:1.5px solid rgba(96,121,133,.22);cursor:pointer;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#7E9B72" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19l1.3-3.5A7.5 7.5 0 1 1 8.5 18.7z"></path></svg><span data-i18n="cta2"></span></a>
        </div>
      </div>

      <!-- hero visual -->
      <div class="hero-visual" style="position:relative;">
        <div aria-hidden="true" style="position:absolute;top:-22px;right:-14px;width:88%;height:96%;border-radius:46% 54% 58% 42%/52% 44% 56% 48%;background:#CDEAE6;"></div>
        <div aria-hidden="true" style="position:absolute;bottom:-26px;left:-26px;width:46%;height:46%;border-radius:50% 50% 48% 52%/50%;background:#EFE0D2;"></div>
        <div class="hero-frame" style="position:relative;width:100%;height:466px;border-radius:46% 54% 56% 44%/52% 46% 54% 48%;overflow:hidden;box-shadow:0 34px 60px -34px rgba(96,121,133,.6);background:radial-gradient(120% 120% at 50% 28%,#FBF6EF 0%,#E9F1EA 100%);display:flex;align-items:flex-end;justify-content:center;">
          <img id="v2hero" src="assets/hero-person.png" alt="Profesional de Epüyen Salud" style="display:block;width:90%;height:auto;max-height:99%;object-fit:contain;">
        </div>
        <!-- isotipo badge -->
        <div style="position:absolute;top:10px;right:16px;width:56px;height:56px;border-radius:50%;background:#FAF6F0;display:flex;align-items:center;justify-content:center;box-shadow:0 12px 26px -12px rgba(96,121,133,.7);animation:floaty 6s ease-in-out infinite;z-index:3;">
          <img src="assets/isotipo.png" alt="" style="height:36px;width:auto;">
        </div>
        <!-- floating illustrations -->
        <img class="hero-deco deco-chat" src="assets/deco-chat.png" alt="" aria-hidden="true" style="position:absolute;top:-18px;left:-30px;width:132px;height:auto;filter:drop-shadow(0 12px 22px rgba(96,121,133,.26));animation:floaty2 7s ease-in-out infinite;z-index:3;">
        <img class="hero-deco deco-check" src="assets/deco-check.png" alt="" aria-hidden="true" style="position:absolute;bottom:-14px;right:-26px;width:152px;height:auto;filter:drop-shadow(0 12px 22px rgba(96,121,133,.26));animation:floaty 6.5s ease-in-out infinite;z-index:3;">
        <!-- script tag -->
        <span style="position:absolute;bottom:38px;left:-16px;font-family:'Dancing Script',cursive;font-weight:600;font-size:23px;color:#b5552f;background:#FAD9CF;padding:4px 15px 6px;border-radius:11px 9px 8px 12px;transform:rotate(-4deg);box-shadow:0 10px 22px -14px rgba(96,121,133,.7);z-index:3;"><span data-i18n="heroTag2"></span></span>
        <!-- sparkle -->
        <svg aria-hidden="true" width="34" height="34" viewBox="0 0 24 24" fill="#B78BC6" style="position:absolute;top:40%;left:-6px;z-index:3;"><path d="M12 0c.6 6 .6 6 12 12-11.4 6-11.4 6-12 12-.6-6-.6-6-12-12 11.4-6 11.4-6 12-12z"></path></svg>
      </div>
    </section>

    <!-- ============ STAT BANNER ============ -->
    <section class="stat-banner" style="position:relative;margin:30px 0 12px;border-radius:30px;overflow:hidden;background:#7E9B72;padding:42px 46px;box-shadow:0 30px 60px -36px rgba(126,155,114,.9);">
      <svg aria-hidden="true" viewBox="0 0 1200 220" preserveAspectRatio="none" style="position:absolute;inset:0;width:100%;height:100%;opacity:.5;"><path d="M-20,150 C140,80 260,210 430,150 C600,90 700,210 870,150 C1010,100 1120,180 1240,140" fill="none" stroke="#EDF3E9" stroke-width="20" stroke-linecap="round" opacity=".45"></path></svg>
      <div style="position:relative;text-align:center;max-width:680px;margin:0 auto 26px;">
        <h2 style="font-family:'Newsreader',serif;font-weight:500;font-size:30px;line-height:1.18;color:#fff;margin:0;"><span data-i18n="bnHead"></span></h2>
      </div>
      <div class="stat-grid" style="position:relative;display:grid;grid-template-columns:repeat(3,1fr);gap:20px;align-items:start;">
        <div style="text-align:center;">
          <div style="display:flex;align-items:center;justify-content:center;gap:9px;"><svg width="22" height="22" viewBox="0 0 24 24" fill="#EDF3E9"><path d="M12 2c.5 5 .5 5 10 10-9.5 5-9.5 5-10 10-.5-5-.5-5-10-10 9.5-5 9.5-5 10-10z"></path></svg><span style="font-family:'Newsreader',serif;font-weight:600;font-size:44px;color:#fff;line-height:1;"><span data-i18n="bn1n"></span></span></div>
          <div style="font-size:14.5px;color:#EAF1E5;margin-top:9px;font-weight:500;"><span data-i18n="bn1l"></span></div>
        </div>
        <div style="text-align:center;border-left:1px solid rgba(255,255,255,.25);border-right:1px solid rgba(255,255,255,.25);">
          <div style="display:flex;align-items:center;justify-content:center;gap:9px;"><svg width="22" height="22" viewBox="0 0 24 24" fill="#EDF3E9"><path d="M12 2c.5 5 .5 5 10 10-9.5 5-9.5 5-10 10-.5-5-.5-5-10-10 9.5-5 9.5-5 10-10z"></path></svg><span style="font-family:'Newsreader',serif;font-weight:600;font-size:44px;color:#fff;line-height:1;"><span data-i18n="bn2n"></span></span></div>
          <div style="font-size:14.5px;color:#EAF1E5;margin-top:9px;font-weight:500;"><span data-i18n="bn2l"></span></div>
        </div>
        <div style="text-align:center;">
          <div style="display:flex;align-items:center;justify-content:center;gap:9px;"><svg width="22" height="22" viewBox="0 0 24 24" fill="#EDF3E9"><path d="M12 2c.5 5 .5 5 10 10-9.5 5-9.5 5-10 10-.5-5-.5-5-10-10 9.5-5 9.5-5 10-10z"></path></svg><span style="font-family:'Newsreader',serif;font-weight:600;font-size:44px;color:#fff;line-height:1;"><span data-i18n="bn3n"></span></span></div>
          <div style="font-size:14.5px;color:#EAF1E5;margin-top:9px;font-weight:500;"><span data-i18n="bn3l"></span></div>
        </div>
      </div>
    </section>

    <!-- ============ ¿QUÉ ESTÁS BUSCANDO? ============ -->
    <section style="position:relative;padding:64px 0 8px;">
      <div style="text-align:center;max-width:640px;margin:0 auto;">
        <span style="font-family:'Dancing Script',cursive;font-weight:600;font-size:27px;color:#E97878;"><span data-i18n="qKicker"></span></span>
        <h2 style="font-family:'Newsreader',serif;font-weight:500;font-size:42px;color:#4a5b62;margin:4px 0 0;letter-spacing:-.01em;"><span data-i18n="qTitle"></span></h2>
        <p style="font-size:17px;line-height:1.6;color:#5b696f;margin:12px 0 0;"><span data-i18n="qSub"></span></p>
      </div>
      <div class="cards" style="display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:44px;">

        <!-- card 1 -->
        <div style="position:relative;background:#FAD9CF;border-radius:24px;padding:26px;min-height:188px;">
          <span style="display:inline-flex;width:50px;height:50px;border-radius:15px;background:#fff;color:#E97878;align-items:center;justify-content:center;"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="3.4"></circle><path d="M5.5 19.5a6.5 6.5 0 0 1 13 0"></path></svg></span>
          <h3 style="font-family:'Newsreader',serif;font-weight:500;font-size:21px;color:#5a3b33;margin:16px 0 0;"><span data-i18n="s1t"></span></h3>
          <p style="font-size:14px;line-height:1.5;color:#8a5e52;margin:7px 0 0;max-width:22ch;"><span data-i18n="s1d"></span></p>
          <span style="position:absolute;bottom:22px;right:22px;width:38px;height:38px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;color:#E97878;"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7M9 7h8v8"></path></svg></span>

let lang = 'es';
function applyI18n(){
  const d = I18N[lang] || I18N.es;
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const k = el.getAttribute('data-i18n');
    if(d[k] != null) el.textContent = d[k];
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(el=>{
    const k = el.getAttribute('data-i18n-ph');
    if(d[k] != null) el.setAttribute('placeholder', d[k]);
  });
  const ln = document.getElementById('langName');
  if(ln) ln.textContent = {es:'ES',en:'EN',pt:'PT'}[lang];
  document.documentElement.lang = lang;
}
function toggleLang(e){
  if(e && e.stopPropagation) e.stopPropagation();
  const m = document.getElementById('langMenu');
  if(m) m.hidden = !m.hidden;
}
function pickLang(l){
  lang = l;
  const m = document.getElementById('langMenu');
  if(m) m.hidden = true;
  applyI18n();
}
function toggleMenu(e){
  if(e && e.stopPropagation) e.stopPropagation();
  const m = document.getElementById('mobileMenu');
  if(m) m.hidden = !m.hidden;
}
function closeMenu(){
  const m = document.getElementById('mobileMenu');
  if(m) m.hidden = true;
}
function openJoin(){
  closeMenu();
  const m = document.getElementById('joinModal');
  if(m){ m.hidden = false; document.body.style.overflow = 'hidden'; }
}
function closeJoin(){
  const m = document.getElementById('joinModal');
  if(m){ m.hidden = true; document.body.style.overflow = ''; }
}
function submitJoin(e){
  e.preventDefault();
  const f = e.target;
  let body = 'Postulación profesional — Epüyen Salud\n\n';
  new FormData(f).forEach((v,k)=>{ body += k + ': ' + (v || '—') + '\n'; });
  const subject = encodeURIComponent('Postulación profesional — Epüyen Salud');
  window.location.href = 'mailto:hola@epuyensalud.com?subject=' + subject + '&body=' + encodeURIComponent(body);
  f.hidden = true;
  const t = document.getElementById('joinThanks');
  if(t) t.hidden = false;
  return false;
}
document.addEventListener('keydown', e=>{ if(e.key === 'Escape') closeJoin(); });
document.addEventListener('click', e=>{
  const m = document.getElementById('langMenu');
  if(m && !m.hidden && !e.target.closest('[data-lang-root]')) m.hidden = true;
});
applyI18n();
